<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>

    <!-- tailwind CDM -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisyui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


</head>

<body class="bg-[#f4f5f7] h-[100vh] flex justify-center items-center">
    <form class=" border-2 bg-white rounded-2xl p-8 w-[400px] border-none">
    <div>
        <label class="font-semibold" for="">Mobile Number</label>
        <br>
        <input type="text" placeholder="Enter Your Number" class="mt-3 rounded-3xl input bg-[#f4f5f7]" />
    </div>

    <div class="mt-5">
        <label class="font-semibold for="">4 Digit Pin</label>
        <br>
        <input type="text" placeholder="Enter 4 Digit Pin" class="mt-3 rounded-3xl input bg-[#f4f5f7]" />
    </div>
    <button class="btn bg-[#0874F2] mt-5 w-full rounded-3xl text-white">Login</button>

    </form>
</body>

</html>
