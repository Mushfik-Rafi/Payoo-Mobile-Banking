<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>

    <!-- tailwind CDM -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisyui CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#f4f5f7] h-[100vh]">

    <div class="max-w-lg mx-auto bg-white rounded-b-xl">

        <!-- navbar -->
        <div class="min-h-[150px] flex justify-between items-center  border-b-1 border-gray-400 p-3">
            <div class="flex ">
                <img src="assets/Group.png" class="h-[50px]" alt="">
                <div class="ml-3">
                    <h2 class="font-bold">$ <span id="available-balance">45000</span></h2>
                    <p class="text-[#08080880]">Available Balance</p>
                </div>
            </div>
            <div>
                <button class="btn text-[#08080880]"><i
                        class="text-gray-700 fa-solid fa-arrow-right-from-bracket rotate-180"></i>Log out</button>
            </div>

        </div>

        <!-- welcome message  -->
        <div class="mt-8 p-3">
            <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1>
            <p class="text-[#08080880]">Enjoy easy and convenient financial services with us. <br> Cashout charge is low
                and
            </p>
        </div>

        <!-- option section -->
        <div class="min-h-[200px] grid grid-cols-3 gap-4">
            <div id="add-btn" class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/wallet1.png" class="mx-auto" alt="">
                <h2>Add Money</h2>
            </div>
            <div id="CashOut-btn" class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/send1.png" class="mx-auto" alt="">
                <h2>Cashout</h2>
            </div>
            <div class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/money1.png" class="mx-auto" alt="">
                <h2>Transfer Money</h2>
            </div>
            <div class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/bonus1.png" class="mx-auto" alt="">
                <h2>Get Bonus</h2>
            </div>
            <div class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/purse1.png" class="mx-auto" alt="">
                <h2>Pay Bill</h2>
            </div>
            <div class="border-2 border-gray-300 text-center p-3 rounded-lg">
                <img src="assets/transaction1.png" class="mx-auto" alt="">
                <h2>Transactions</h2>
            </div>
        </div>

    </div>

    <!-- features section -->
    <div class="all-form-section max-w-lg mx-auto">

        <!-- add money -->
        <div id="add-money-parent">
            <h1 class="font-bold my-5">Add Money</h1>
            <form action="" class="bg-white rounded-2xl p-8">
                <div class="mb-3">
                    <h1 class="font-semibold">Select a Bank</h1>
                    <select id="bank" class="select bg-white rounded-3xl mt-3 w-full">
                        <option>Select Bank</option>
                        <option>AB Bank</option>
                        <option>IFIC Bank</option>
                        <option>DBBL</option>
                    </select>
                </div>
                <div>
                    <label class="font-semibold" for="">Bank Account Number</label>
                    <br>
                    <input id="account-number" type="text" placeholder="Enter 11 Digit Number"
                        class="mt-3 rounded-3xl input bg-[#f4f5f7] w-full" />
                </div>
                <div class="mt-3">
                    <label class="font-semibold" for="">Amount to Add</label>
                    <br>
                    <input id="add-amount" type="text" placeholder="Add Amount to withdraw"
                        class="mt-3 rounded-3xl input bg-[#f4f5f7] w-full" />
                </div>

                <div class="mt-3">
                    <label class="font-semibold" for="">Pin Number</label>
                    <br>
                    <input id="add-pin" type="text" placeholder="Enter 4 Digit Number"
                        class="mt-3 w-full rounded-3xl input bg-[#f4f5f7]" />
                </div>
                <button id="add-money-btn" class="btn bg-[#0874F2] mt-5 w-full rounded-3xl text-white">Add
                    Money</button>
            </form>
        </div>

        <!-- cash-out section -->
        <div id="cash-out-parent" style=" display: none;"">
        <h1 class=" font-bold my-5">CashOut</h1>
            <form action="" class="bg-white rounded-2xl p-8">
                <div>
                    <label class="font-semibold" for="">Agent Number</label>
                    <br>
                    <input type="text" placeholder="Enter 11 Digit Number"
                        class="mt-3 rounded-3xl input bg-[#f4f5f7] w-full" />
                </div>
                <div class="mt-3">
                    <label class="font-semibold" for="">Amount</label>
                    <br>
                    <input id="withdraw-amount" type="text" placeholder="Enter Amount to withdraw"
                        class="mt-3 rounded-3xl input bg-[#f4f5f7] w-full" />
                </div>

                <div class="mt-3">
                    <label class="font-semibold" for="">Pin Number</label>
                    <br>
                    <input type="text" placeholder="Enter 4 Digit Number"
                        class="mt-3 w-full rounded-3xl input bg-[#f4f5f7]" />
                </div>
                <button id="withdraw-btn" class="btn bg-[#0874F2] mt-5 w-full rounded-3xl text-white">Withdraw Money</button>
            </form>
        </div>


    </div>

    <script src="home.js"></script>
</body>

</html>
